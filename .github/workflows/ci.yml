# ---------------------------------------------------------------
# RECKIT CI -- Lint, Security Scan, License & Protected-File Gates
# ---------------------------------------------------------------
# Triggers:
#   - pull_request: ANY target branch. A PR from `sub-feature`
#     to `feat-cam-person` runs the same gates as a PR to
#     `dev` or `master`. This is intentional — every merge in
#     the chain must meet the pre-check bar before reaching
#     dev / master.
#   - push: feature branches only (`feat-*`, `feat/*`,
#     `feature/*`, `fix-*`, `fix/*`). Gives developers
#     feedback before they open a PR. master / dev are skipped
#     here because they're protected and only receive commits
#     via PRs (which fire the pull_request trigger above).
# ---------------------------------------------------------------

name: CI

on:
  pull_request:
  push:
    branches:
      - 'feat-*'
      - 'feat/**'
      - 'feature/**'
      - 'fix-*'
      - 'fix/**'

# Dedup rapid pushes and push-vs-PR duplicate runs on the same
# ref. `head_ref` is the branch name for pull_request events;
# `ref` is the branch ref for push events.
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  # ── ESLint ────────────────────────────────────────────────────
  eslint:
    name: ESLint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for JS/TS files
        id: has_js
        run: |
          if find . -type f \( -name '*.js' -o -name '*.mjs' -o -name '*.ts' \) \
               ! -path './node_modules/*' ! -path './dist/*' | grep -q .; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node
        if: steps.has_js.outputs.found == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        if: steps.has_js.outputs.found == 'true'
        run: npm ci

      - name: Run ESLint
        if: steps.has_js.outputs.found == 'true'
        run: npm run lint

      - name: Skip -- no JS/TS files
        if: steps.has_js.outputs.found == 'false'
        run: echo "No JS/TS files found in repository -- skipping ESLint."

  # ── Security Scan ─────────────────────────────────────────────
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Scan JS files for dangerous patterns
        run: |
          EXIT_CODE=0

          # Emit each grep hit as a GitHub annotation pinned to
          # the file + line, and also print a human-readable
          # line to the raw log so the failure is obvious there.
          #
          # $1 = grep output (file:line:content lines)
          # $2 = category label for the annotation message
          annotate_hits() {
            local hits="$1"
            local label="$2"
            while IFS= read -r hit; do
              [ -z "$hit" ] && continue
              local file="${hit%%:*}"
              local rest="${hit#*:}"
              local line="${rest%%:*}"
              local content="${rest#*:}"
              echo "[$label] $file:$line :: $content"
              echo "::error file=${file},line=${line}::${label} — ${content}"
            done <<< "$hits"
          }

          echo "=== Scanning for dangerous function calls ==="
          # eslint.config.mjs is excluded: it legitimately
          # contains literal strings describing the banned
          # patterns (they are the rule messages that forbid
          # the patterns everywhere else).
          HITS=$(grep -rn --include='*.js' --include='*.mjs' \
               --exclude-dir='node_modules' --exclude-dir='dist' --exclude-dir='.cache' \
               --exclude='eslint.config.mjs' \
               -E 'eval\(|[^.]Function\(|\.innerHTML\s*=|document\.write\(' . || true)
          if [ -n "$HITS" ]; then
            annotate_hits "$HITS" "dangerous-call"
            echo "::error::Dangerous function calls detected (eval, Function, innerHTML, document.write). See annotations above."
            EXIT_CODE=1
          fi

          echo ""
          echo "=== Scanning for setTimeout/setInterval with string arguments ==="
          HITS=$(grep -rn --include='*.js' --include='*.mjs' \
               --exclude-dir='node_modules' --exclude-dir='dist' --exclude-dir='.cache' \
               -E 'setTimeout\(\s*["\x27`]|setInterval\(\s*["\x27`]' . || true)
          if [ -n "$HITS" ]; then
            annotate_hits "$HITS" "implicit-eval"
            echo "::error::setTimeout/setInterval called with string argument -- use a function reference instead"
            EXIT_CODE=1
          fi

          echo ""
          echo "=== Scanning for hardcoded tokens/secrets ==="
          HITS=$(grep -rn --include='*.js' --include='*.mjs' \
               --exclude-dir='node_modules' --exclude-dir='dist' --exclude-dir='.cache' \
               -iE '(token|secret|api_key|password|apikey|api_secret)\s*[=:]\s*["\x27`]' . || true)
          if [ -n "$HITS" ]; then
            annotate_hits "$HITS" "possible-secret"
            echo "::error::Possible hardcoded secret detected"
            EXIT_CODE=1
          fi

          echo ""
          echo "=== Scanning for insecure http:// URLs ==="
          HITS=$(grep -rn --include='*.js' --include='*.mjs' \
               --exclude-dir='node_modules' --exclude-dir='dist' --exclude-dir='.cache' \
               -E 'http://' . | grep -v 'localhost' | grep -v '127.0.0.1' || true)
          if [ -n "$HITS" ]; then
            annotate_hits "$HITS" "insecure-http"
            echo "::error::Insecure http:// URL detected -- use https:// instead"
            EXIT_CODE=1
          fi

          if [ "$EXIT_CODE" -eq 0 ]; then
            echo ""
            echo "All security checks passed."
          fi

          exit $EXIT_CODE

  # ── License Header Check ──────────────────────────────────────
  license-headers:
    name: License Headers
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify copyright headers
        run: |
          EXIT_CODE=0
          MISSING=()
          FILES=$(find . -type f \( -name '*.js' -o -name '*.mjs' -o -name '*.html' -o -name '*.css' -o -name '*.vue' -o -name '*.scss' \) \
                    ! -path './node_modules/*' ! -path './dist/*' ! -path './.cache/*' ! -path './assets/*')

          if [ -z "$FILES" ]; then
            echo "No source files found -- nothing to check."
            exit 0
          fi

          for f in $FILES; do
            HEADER=$(head -n 5 "$f")
            if ! echo "$HEADER" | grep -q "Cristian D. Moreno"; then
              # Print to the raw log so the filename is visible
              # even without expanding the PR annotation panel.
              echo "[MISSING HEADER] $f"
              # GitHub annotation pinned to line 1 of the file.
              echo "::error file=$f,line=1::Missing copyright header (\"Cristian D. Moreno\" not in first 5 lines of $f)"
              MISSING+=("$f")
              EXIT_CODE=1
            fi
          done

          echo ""
          if [ "$EXIT_CODE" -eq 0 ]; then
            echo "All files contain the required copyright header."
          else
            echo "=== Summary ==="
            echo "${#MISSING[@]} file(s) missing a copyright header:"
            for f in "${MISSING[@]}"; do
              echo "  - $f"
            done
          fi

          exit $EXIT_CODE

  # ── Protected Files Check ─────────────────────────────────────
  protected-files:
    name: Protected Files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for protected file modifications
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Tiered list of files where silent modification could
          # compromise the repo. Grouping drives the warning
          # message so reviewers see WHY each file matters.
          LEGAL_FILES="LICENSE LICENSE-APACHE NOTICE LICENSING.org"
          GOVERNANCE_FILES=".github/CODEOWNERS .github/SECURITY.org .github/PULL_REQUEST_TEMPLATE.md"
          SUPPLY_CHAIN_FILES="package.json package-lock.json"
          CI_SECURITY_FILES=".github/workflows/ci.yml .github/workflows/release.yml eslint.config.mjs"
          BUILD_CONFIG_FILES="vite.config.js .gitignore .env.example"
          RELEASE_ARTIFACT_FILES="CHANGELOG.org README.org"

          CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD 2>/dev/null || echo "")

          LEGAL_HITS=""
          GOVERNANCE_HITS=""
          SUPPLY_HITS=""
          CI_HITS=""
          BUILD_HITS=""
          RELEASE_HITS=""

          check_category() {
            local category_name="$1"
            local files="$2"
            local hits=""
            for pf in $files; do
              if echo "$CHANGED" | grep -qx "$pf"; then
                hits="${hits}- \`${pf}\` was modified\n"
              fi
            done
            echo -n "$hits"
          }

          LEGAL_HITS=$(check_category "Legal" "$LEGAL_FILES")
          GOVERNANCE_HITS=$(check_category "Governance" "$GOVERNANCE_FILES")
          SUPPLY_HITS=$(check_category "Supply chain" "$SUPPLY_CHAIN_FILES")
          CI_HITS=$(check_category "CI / Security" "$CI_SECURITY_FILES")
          BUILD_HITS=$(check_category "Build / Config" "$BUILD_CONFIG_FILES")
          RELEASE_HITS=$(check_category "Release artifact" "$RELEASE_ARTIFACT_FILES")

          # Compose the comment only for non-empty categories.
          COMMENT=""
          add_section() {
            local title="$1"
            local hits="$2"
            local note="$3"
            if [ -n "$hits" ]; then
              COMMENT="${COMMENT}### ${title}\n\n${hits}\n*${note}*\n\n"
            fi
          }

          add_section "Legal / Licensing" "$LEGAL_HITS" \
            "Modifying these files changes the project's legal posture. Confirm with the maintainer before merging."
          add_section "Governance" "$GOVERNANCE_HITS" \
            "CODEOWNERS / SECURITY / PR template changes affect how every future PR is reviewed. Review carefully."
          add_section "Supply Chain" "$SUPPLY_HITS" \
            "Dependency or lockfile changes. Verify the diff (no unexpected packages, no version downgrades)."
          add_section "CI / Security Config" "$CI_HITS" \
            "Workflow / lint config. A quiet edit here can disable gates — diff against origin carefully."
          add_section "Build / Config" "$BUILD_HITS" \
            "Build or gitignore config. Verify the build still passes and no ignored paths were accidentally un-ignored."
          add_section "Release Artifact" "$RELEASE_HITS" \
            "Release-tracking files. Expected on release PRs; flag on non-release PRs."

          if [ -n "$COMMENT" ]; then
            COMMENT="## Protected Files Modified\n\nOne or more files in the protected set were changed in this PR. Each category below explains why the file matters.\n\n${COMMENT}"
            echo -e "$COMMENT"
            echo "::warning::Protected files were modified in this PR -- review carefully"

            if [ -n "${{ github.event.pull_request.number }}" ]; then
              gh pr comment "${{ github.event.pull_request.number }}" \
                --body "$(echo -e "$COMMENT")" || true
            fi
          else
            echo "No protected files were modified."
          fi

  # ── Unit Tests ────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Run Vitest
        run: npm run test

  # ── Pre-Check Failure Label ───────────────────────────────────
  # Aggregates the outcome of every gate above and keeps the
  # "Pre-Check Failed" label on the PR in sync. Applied when any
  # gate failed or was cancelled. Removed on clean runs.
  pre-check-label:
    name: Pre-Check Label
    runs-on: ubuntu-latest
    needs: [eslint, security-scan, license-headers, unit-tests]
    if: always() && github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - name: Sync "Pre-Check Failed" label
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          ESLINT_RESULT: ${{ needs.eslint.result }}
          SECURITY_RESULT: ${{ needs.security-scan.result }}
          LICENSE_RESULT: ${{ needs.license-headers.result }}
          TESTS_RESULT: ${{ needs.unit-tests.result }}
        run: |
          echo "Gate outcomes:"
          echo "  eslint          : $ESLINT_RESULT"
          echo "  security-scan   : $SECURITY_RESULT"
          echo "  license-headers : $LICENSE_RESULT"
          echo "  unit-tests      : $TESTS_RESULT"

          if [[ "$ESLINT_RESULT" != "success" ]] \
             || [[ "$SECURITY_RESULT" != "success" ]] \
             || [[ "$LICENSE_RESULT" != "success" ]] \
             || [[ "$TESTS_RESULT" != "success" ]]; then
            echo "::warning::One or more pre-checks failed -- applying 'Pre-Check Failed' label"
            gh pr edit "$PR_NUMBER" \
              --repo "$REPO" \
              --add-label "Pre-Check Failed"
          else
            echo "All pre-checks passed -- removing 'Pre-Check Failed' label if present"
            gh pr edit "$PR_NUMBER" \
              --repo "$REPO" \
              --remove-label "Pre-Check Failed" 2>/dev/null || true
          fi
